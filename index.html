<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive WebGIS displaying emergency and public facilities across Bangkok, Thailand.">
    <title>Bangkok Emergency & Public Facilities - WebGIS</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header id="app-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>Bangkok WebGIS</h1>
                    <span class="subtitle">Emergency & Public Facilities</span>
                </div>
            </div>
            <div class="header-stats" id="header-stats">
                <div class="stat-badge">
                    <span class="stat-number" id="total-features">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-number" id="visible-features">0</span>
                    <span class="stat-label">Visible</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </div>

        <div class="sidebar-content">

            <!-- Layer Control Section -->
            <section class="sidebar-section">
                <h2 class="section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                        <polyline points="2 17 12 22 22 17"/>
                        <polyline points="2 12 12 17 22 12"/>
                    </svg>
                    Layers
                </h2>
                <div id="layer-controls" class="layer-controls">
                    <!-- Dynamically populated -->
                </div>
            </section>

            <!-- Basemap Section -->
            <section class="sidebar-section">
                <h2 class="section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                    Basemap
                </h2>
                <div class="basemap-controls" id="basemap-controls">
                    <label class="basemap-option active" data-basemap="dark">
                        <input type="radio" name="basemap" value="dark" checked>
                        <span class="basemap-preview dark-preview"></span>
                        <span class="basemap-name">Dark</span>
                    </label>
                    <label class="basemap-option" data-basemap="light">
                        <input type="radio" name="basemap" value="light">
                        <span class="basemap-preview light-preview"></span>
                        <span class="basemap-name">Light</span>
                    </label>
                    <label class="basemap-option" data-basemap="satellite">
                        <input type="radio" name="basemap" value="satellite">
                        <span class="basemap-preview satellite-preview"></span>
                        <span class="basemap-name">Satellite</span>
                    </label>
                    <label class="basemap-option" data-basemap="street">
                        <input type="radio" name="basemap" value="street">
                        <span class="basemap-preview street-preview"></span>
                        <span class="basemap-name">Street</span>
                    </label>
                </div>
            </section>

            <!-- Legend Section -->
            <section class="sidebar-section">
                <h2 class="section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                    Legend
                </h2>
                <div id="legend-items" class="legend-items">
                    <!-- Dynamically populated -->
                </div>
                <!-- Hint -->
                <p class="legend-hint">👆 Klik untuk show / hide layer di peta</p>
            </section>

        </div>
    </aside>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader">
            <div class="loader-ring"></div>
            <p>Loading GIS Data...</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- App JS -->
    <script src="app.js"></script>

</body>
</html>
